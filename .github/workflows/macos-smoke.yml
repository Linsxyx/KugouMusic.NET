name: macOS Smoke Test

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/macos-smoke.yml"
      - "KugouAvaloniaPlayer/**"
      - "SimpleAudio/**"
      - "KuGou.Net/**"
      - "KuGou.Net.Native/**"
      - ".github/workflows/release.yml"
      - "KugouMusic.NET.slnx"
  pull_request:
    paths:
      - ".github/workflows/macos-smoke.yml"
      - "KugouAvaloniaPlayer/**"
      - "SimpleAudio/**"
      - "KuGou.Net/**"
      - "KuGou.Net.Native/**"
      - ".github/workflows/release.yml"
      - "KugouMusic.NET.slnx"

jobs:
  smoke:
    runs-on: macos-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Show environment
        run: |
          sw_vers
          uname -a
          dotnet --info

      - name: Restore
        run: dotnet restore KugouMusic.NET.slnx

      - name: Build
        run: dotnet build KugouMusic.NET.slnx -c Release --no-restore

      - name: Publish macOS app
        run: |
          dotnet publish ./KugouAvaloniaPlayer/KugouAvaloniaPlayer.csproj \
            -c Release \
            -r osx-arm64 \
            --self-contained true \
            -o ./publish/macos

      - name: List publish output
        run: |
          mkdir -p ./diagnostics
          {
            echo "=== publish/macos ==="
            ls -la ./publish/macos || true
            echo
            echo "=== dylib files ==="
            find ./publish/macos -name "*.dylib" -print || true
            echo
            echo "=== app bundles ==="
            find ./publish/macos -maxdepth 3 \( -name "*.app" -o -name "*.pkg" \) -print || true
          } | tee ./diagnostics/publish-tree.txt

      - name: Smoke run published binary
        run: |
          set -euxo pipefail
          chmod +x ./publish/macos/KugouAvaloniaPlayer
          ./publish/macos/KugouAvaloniaPlayer > ./diagnostics/smoke.log 2>&1 &
          APP_PID=$!
          echo "PID=$APP_PID"

          sleep 8

          if ! kill -0 "$APP_PID" 2>/dev/null; then
            echo "App exited too early" | tee -a ./diagnostics/smoke.log
            cat ./diagnostics/smoke.log || true
            exit 1
          fi

          echo "App is still running after 8s, treating as smoke-pass" | tee -a ./diagnostics/smoke.log
          kill "$APP_PID" || true
          wait "$APP_PID" || true

          cat ./diagnostics/smoke.log || true

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Pack with Velopack
        run: |
          set -euxo pipefail
          export PATH="$HOME/.dotnet/tools:$PATH"
          which vpk
          which cp
          vpk pack \
            -u KugouAvaloniaPlayer \
            -v 0.0.1 \
            -p ./publish/macos \
            -e KugouAvaloniaPlayer \
            -o ./releases

      - name: List release output
        run: |
          {
            echo "=== releases ==="
            find ./releases -maxdepth 4 -print || true
          } | tee ./diagnostics/releases-tree.txt

      - name: Inspect packaged mac artifacts
        run: |
          set -euxo pipefail

          APP_PATH="$(find ./releases -name "*.app" | head -n 1 || true)"
          PKG_PATH="$(find ./releases -name "*.pkg" | head -n 1 || true)"

          {
            echo "APP_PATH=$APP_PATH"
            echo "PKG_PATH=$PKG_PATH"
            echo
            echo "=== app bundles ==="
            find ./releases -name "*.app" -print || true
            echo
            echo "=== pkg files ==="
            find ./releases -name "*.pkg" -print || true
          } | tee ./diagnostics/artifact-paths.txt

          if [ -n "$APP_PATH" ]; then
            {
              echo "=== Info.plist ==="
              plutil -p "$APP_PATH/Contents/Info.plist" || true
              echo
              echo "=== App bundle files ==="
              find "$APP_PATH/Contents" -maxdepth 4 -print || true
              echo
              echo "=== codesign -dv --verbose=4 ==="
              codesign -dv --verbose=4 "$APP_PATH" 2>&1 || true
              echo
              echo "=== spctl -a -vv APP ==="
              spctl -a -vv "$APP_PATH" 2>&1 || true
              echo
              echo "=== xattr -lr APP ==="
              xattr -lr "$APP_PATH" 2>&1 || true
            } | tee ./diagnostics/app-inspect.txt
          else
            echo "No .app found in releases" | tee ./diagnostics/app-inspect.txt
          fi

          if [ -n "$PKG_PATH" ]; then
            {
              echo "=== spctl -a -vv -t install PKG ==="
              spctl -a -vv -t install "$PKG_PATH" 2>&1 || true
              echo
              echo "=== xattr -lr PKG ==="
              xattr -lr "$PKG_PATH" 2>&1 || true
              echo
              echo "=== pkgutil --check-signature PKG ==="
              pkgutil --check-signature "$PKG_PATH" 2>&1 || true
            } | tee ./diagnostics/pkg-inspect.txt
          else
            echo "No .pkg found in releases" | tee ./diagnostics/pkg-inspect.txt
          fi

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-smoke-diagnostics
          path: |
            ./diagnostics/**
            ./releases/**
          if-no-files-found: warn
