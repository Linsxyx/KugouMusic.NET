name: Verify macOS Release Package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to verify, for example v0.9.4"
        required: true
        type: string

jobs:
  verify-release-pkg:
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Prepare folders
        run: |
          mkdir -p diagnostics
          mkdir -p downloads

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euxo pipefail

          API_URL="https://api.github.com/repos/$REPO/releases/tags/$TAG"
          curl -L \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$API_URL" \
            -o diagnostics/release.json

          cat diagnostics/release.json

          PKG_URL="$(python3 - <<'PY'
import json
with open("diagnostics/release.json", "r", encoding="utf-8") as f:
    data = json.load(f)

assets = data.get("assets", [])
target = None
for a in assets:
    name = a.get("name", "")
    if name == "KugouAvaloniaPlayer-mac.pkg" or name.endswith(".pkg"):
        target = a.get("browser_download_url")
        break

print(target or "")
PY
          )"

          if [ -z "$PKG_URL" ]; then
            echo "No mac pkg asset found in release $TAG" | tee diagnostics/download.log
            exit 1
          fi

          echo "PKG_URL=$PKG_URL" | tee diagnostics/download.log

          curl -L "$PKG_URL" -o downloads/KugouAvaloniaPlayer-mac.pkg

          ls -lah downloads | tee -a diagnostics/download.log
          shasum -a 256 downloads/KugouAvaloniaPlayer-mac.pkg | tee diagnostics/pkg-sha256.txt

      - name: Inspect downloaded pkg
        run: |
          set -euxo pipefail
          {
            echo "=== file ==="
            file downloads/KugouAvaloniaPlayer-mac.pkg || true
            echo
            echo "=== pkgutil --check-signature ==="
            pkgutil --check-signature downloads/KugouAvaloniaPlayer-mac.pkg || true
            echo
            echo "=== spctl (.pkg) ==="
            spctl -a -vv -t install downloads/KugouAvaloniaPlayer-mac.pkg || true
          } | tee diagnostics/pkg-inspect.txt

      - name: Install downloaded pkg
        run: |
          set -euxo pipefail
          sudo installer -pkg downloads/KugouAvaloniaPlayer-mac.pkg -target / | tee diagnostics/installer.log

      - name: Inspect installed app
        run: |
          set -euxo pipefail
          APP_DIR="/Applications/KugouAvaloniaPlayer.app"

          {
            echo "=== installed app exists ==="
            ls -la "$APP_DIR" || true
            echo
            echo "=== installed Info.plist ==="
            plutil -p "$APP_DIR/Contents/Info.plist" || true
            echo
            echo "=== installed app tree ==="
            find "$APP_DIR/Contents" -maxdepth 4 -print || true
            echo
            echo "=== codesign installed app ==="
            codesign -dv --verbose=4 "$APP_DIR" || true
            echo
            echo "=== spctl installed app ==="
            spctl -a -vv "$APP_DIR" || true
            echo
            echo "=== xattr installed app ==="
            xattr -lr "$APP_DIR" || true
          } | tee diagnostics/installed-app-inspect.txt

      - name: Smoke run installed app
        run: |
          set -euxo pipefail
          APP_BIN="/Applications/KugouAvaloniaPlayer.app/Contents/MacOS/KugouAvaloniaPlayer"

          if [ ! -f "$APP_BIN" ]; then
            echo "Installed app binary not found: $APP_BIN" | tee diagnostics/installed-smoke.log
            exit 1
          fi

          chmod +x "$APP_BIN"
          "$APP_BIN" > diagnostics/installed-smoke.log 2>&1 &
          APP_PID=$!
          echo "PID=$APP_PID" | tee -a diagnostics/installed-smoke.log

          sleep 8

          if ! kill -0 "$APP_PID" 2>/dev/null; then
            echo "Installed app exited too early" | tee -a diagnostics/installed-smoke.log
            cat diagnostics/installed-smoke.log || true
            exit 1
          fi

          echo "Installed app is still running after 8s, treating as pass" | tee -a diagnostics/installed-smoke.log
          kill "$APP_PID" || true
          wait "$APP_PID" || true

          cat diagnostics/installed-smoke.log || true

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-verify-${{ inputs.tag }}
          path: |
            diagnostics/**
            downloads/KugouAvaloniaPlayer-mac.pkg
          if-no-files-found: warn
